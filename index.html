<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل مصروف جديد | اللجنة الإعلامية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container mt-4 mb-5">
        <div class="card p-4 form-card">
            <h4 class="text-center mb-4 text-primary fw-bold">📝 إضافة مصروف جديد</h4>
            
            <form id="expenseForm">
                <div class="mb-3">
                    <label class="form-label">التاريخ *</label>
                    <input type="date" class="form-control" id="date" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">جهة الصرف (Vendor) *</label>
                    <input type="text" class="form-control" id="vendor" placeholder="مثال: مطبعة، مكتبة..." required>
                </div>

                <div class="mb-3">
                    <label class="form-label">المبلغ (BHD) *</label>
                    <input type="number" step="0.001" min="0.1" class="form-control" id="amount" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">التصنيف *</label>
                    <select class="form-select" id="category" required>
                        <option value="">جاري التحميل...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">العضو القائم بالدفع *</label>
                    <select class="form-select" id="member" required>
                        <option value="">جاري التحميل...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">الحالة</label>
                    <select class="form-select" id="status">
                        <option value="مدفوع" selected>مدفوع</option>
                        <option value="غير مدفوع">غير مدفوع</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">اللجنة المالية</label>
                    <select class="form-select" id="financeCommittee">
                        <option value="">جاري التحميل...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">رقم الفاتورة (اختياري)</label>
                    <input type="text" class="form-control" id="invoiceNo">
                </div>

                <div class="mb-3">
                    <label class="form-label">الوصف *</label>
                    <textarea class="form-control" id="description" rows="2" placeholder="تفاصيل المصروف..." required></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">المرفق (صورة / PDF) *</label>
                    <input type="file" class="form-control" id="attachment" accept="image/*,.pdf" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3" id="submitBtn">حفظ العملية 💾</button>
            </form>
            
            <div id="messageBox" class="mt-3 text-center"></div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
