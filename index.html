<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>النظام المالي | اللجنة الإعلامية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, sans-serif; padding-bottom: 50px; }
        .nav-pills .nav-link { color: #495057; border-radius: 8px; margin: 0 5px; font-weight: bold; cursor: pointer; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: white; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container mt-3 mb-4">
        <ul class="nav nav-pills justify-content-center p-2 bg-white rounded shadow-sm">
            <li class="nav-item">
                <a class="nav-link active" id="tab-submit" onclick="switchTab('submit')">📝 إضافة مصروف</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="tab-admin" onclick="switchTab('admin')">📊 لوحة الإدارة</a>
            </li>
        </ul>
    </div>

    <div class="container">
        
        <div id="view-submit" class="card p-4">
            <h5 class="text-center mb-4 text-primary fw-bold">تسجيل مصروف جديد</h5>
            <form id="expenseForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">التاريخ *</label>
                        <input type="date" class="form-control" id="date" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">جهة الصرف *</label>
                        <input type="text" class="form-control" id="vendor" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">المبلغ (BHD) *</label>
                        <input type="number" step="0.001" class="form-control" id="amount" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">التصنيف *</label>
                        <select class="form-select" id="category" required><option>جاري التحميل...</option></select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">العضو القائم بالدفع *</label>
                        <select class="form-select" id="member" required><option>جاري التحميل...</option></select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">الحالة</label>
                        <select class="form-select" id="status">
                            <option value="مدفوع" selected>مدفوع</option>
                            <option value="غير مدفوع">غير مدفوع</option>
                        </select>
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">الوصف *</label>
                        <textarea class="form-control" id="description" rows="2" required></textarea>
                    </div>
                    <div class="col-12 mb-4">
                        <label class="form-label">المرفق (صورة / PDF) *</label>
                        <input type="file" class="form-control mb-2" id="attachment" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">حفظ العملية 💾</button>
            </form>
            <div id="messageBox" class="mt-3 text-center"></div>
        </div>

        <div id="view-auth" class="card p-4 text-center hidden" style="max-width: 400px; margin: auto;">
            <h5 class="mb-3">🔒 تسجيل الدخول للإدارة</h5>
            <p class="text-muted small">يرجى إدخال رمز المرور للوصول للبيانات المالية.</p>
            <input type="password" id="adminPin" class="form-control text-center mb-3" placeholder="****">
            <button class="btn btn-dark w-100" onclick="loginAdmin()">دخول</button>
            <div id="authError" class="text-danger mt-2 small"></div>
        </div>

        <div id="view-dashboard" class="hidden">
            <div class="row mb-3">
                <div class="col-6">
                    <div class="card bg-primary text-white p-3">
                        <h6>مصروفات الشهر</h6><h4 id="monthlyTotal">0.000</h4>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card bg-danger text-white p-3">
                        <h6>غير مدفوع</h6><h4 id="unpaidTotal">0.000</h4>
                    </div>
                </div>
            </div>
            <div class="card p-3 table-responsive">
                <table class="table table-hover table-bordered" style="font-size: 0.9rem;">
                    <thead class="table-light">
                        <tr>
                            <th>التاريخ</th><th>الجهة</th><th>المبلغ</th><th>الحالة</th><th>العضو</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr><td colspan="5" class="text-center">جاري جلب البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
