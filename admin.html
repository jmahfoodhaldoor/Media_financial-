<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | النظام المالي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">النظام المالي - لوحة الإدارة</span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">تسجيل خروج</button>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card bg-primary text-white p-3 shadow-sm">
                    <h5>إجمالي الشهر</h5>
                    <h3 id="monthlyTotal">0.000 BHD</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-danger text-white p-3 shadow-sm">
                    <h5>غير مدفوع</h5>
                    <h3 id="unpaidTotal">0.000 BHD</h3>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-5">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">سجل المصروفات (Expenses)</h5>
                <button class="btn btn-success btn-sm">تصدير Excel 📊</button>
            </div>
            <div class="card-body table-responsive">
                <table class="table table-hover table-bordered" id="expensesTable">
                    <thead class="table-light">
                        <tr>
                            <th>التاريخ</th>
                            <th>الجهة</th>
                            <th>التصنيف</th>
                            <th>المبلغ</th>
                            <th>الحالة</th>
                            <th>العضو</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr><td colspan="7" class="text-center">سيتم ربط البيانات لاحقاً...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="assets/js/admin.js"></script>
</body>
</html>
